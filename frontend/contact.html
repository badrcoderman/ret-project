<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا</title>
    <link rel="stylesheet" href="style.css">
</head>
 <body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">الرئيسية</a>
        </div>
        <select id="langSelect" onchange="changeLanguage(this.value)" class="lang-select">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </nav>

    <div class="glass-card">
        <h1 id="supportTitle">مركز الدعم</h1>
        <form action="/contact" method="post">
            <label for="name" id="lblUser">الاسم الكامل</label>
            <input type="text" id="name" name="name" required>

            <label for="email" id="lblEmail">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" required>

            <label for="message">رسالتك</label>
            <textarea id="message" name="message" required rows="4"></textarea>

            <button type="submit" id="btnSubmit">إرسال</button>    
        </form>
    </div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
 </body>
</html>
