<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
<meta name="description" content="صفحة تسجيل مستخدم جديد">
<meta name="keywords" content="تسجيل, مستخدم جديد, حساب, انشاء حساب">
<link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">الرئيسية</a>
        </div>
        <select id="langSelect" onchange="changeLanguage(this.value)" class="lang-select">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </nav>

    <div class="glass-card">
        <h1 id="signupTitle">انضم إلى المجتمع</h1>
        <form action="/signup" method="post">
            <label for="newUsername" id="lblUser">اسم المستخدم</label>
            <input type="text" id="newUsername" name="newUsername" required>
            
            <label for="newEmail" id="lblEmail">البريد الإلكتروني</label>
            <input type="email" id="newEmail" name="newEmail" required>
            
            <label for="newPassword" id="lblPass">كلمة المرور</label>
            <input type="password" id="newPassword" name="newPassword" required>
            
            <label for="confirmPassword" id="lblConfirm">تأكيد كلمة المرور</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            
            <button type="submit" id="btnSubmit">إنشاء الحساب</button>
            
            <p id="footerText" style="margin-top: 20px;">لديك حساب؟ </p>
            <a href="/login.html" id="footerLink" style="display:block; text-align:center;">سجل دخولك</a>
        </form>
    </div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
