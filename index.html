<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة الرئيسية</title>
    <meta name="description" content="الصفحة الرئيسية للموقع">
    <meta name="keywords" content="الصفحة الرئيسية, موقع, تسجيل الدخول, حساب, انشاء حساب">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="index.html" class="nav-btn active" id="navHome">الصفحة الرئيسية</a>
            <a href="signup.html" class="nav-btn" id="navSignup">إنشاء حساب</a>
            <a href="login.html" class="nav-btn" id="navLogin">تسجيل الدخول</a>
            <a href="contact.html" class="nav-btn" id="navContact">تواصل معنا</a>
        </div>
        <div>
            <select id="langSelect" onchange="changeLanguage(this.value)" style="padding: 5px; border-radius: 4px;">
                <option value="ar">العربية</option>
                <option value="en">English</option>
            </select>
        </div>
    </nav>

    <div class="xp-window">
        <div class="title-bar">
            <span id="welcomeTitle">الصفحة الرئيسية</span>
            <div class="window-controls"><span></span><span></span><span></span></div>
        </div>
        <div class="window-body">
            <p id="welcomeText">مرحبًا بك في موقعنا! يرجى تسجيل الدخول أو إنشاء حساب جديد للمتابعة.</p>
            
            <div class="upload-container">
                <form id="uploadForm">
                    <div class="upload-drop-zone">
                        <div class="upload-label" id="dropText">اضغط هنا أو اسحب الملف لرفعه</div>
                        <input type="file" name="fileToUpload" id="fileToUpload" onchange="updateFileName()">
                    </div>
                    <div id="file-name-display"></div>
                    <br>
                    <div id="progressContainer" class="progress-container">
                        <div id="progressBar" class="progress-bar"></div>
                    </div>
                    <button type="submit" class="btn-upload" id="btnUpload">رفع الملف</button>
                </form>
            </div>
            <div id="message"></div>

            <hr style="border: 0; border-top: 1px solid #7F9DB9; margin: 20px 0;">
            
            <h2 id="dashboardTitle" style="font-size: 16px; margin-bottom: 10px;">الملفات المرفوعة</h2>
            <div class="dashboard-table-container">
                <table class="xp-table">
                    <thead>
                        <tr>
                            <th id="thName">اسم الملف</th>
                            <th id="thSize">الحجم</th>
                            <th id="thDate">التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="fileListBody">
                        <!-- Files will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>
</html>
